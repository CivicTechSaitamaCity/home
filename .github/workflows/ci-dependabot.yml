name: ci-check

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v4

      - name: Setup node env 🏗
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run generate
